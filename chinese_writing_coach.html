<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文心 · 中文写作练习</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf7f2;
  --bg2: #f3ede3;
  --ink: #1a1209;
  --ink2: #2d2010;
  --ink3: #5a3e28;
  --red: #c0392b;
  --red2: #e74c3c;
  --gold: #d4a017;
  --gold2: #f0c040;
  --green: #2d6a4f;
  --green2: #52b788;
  --muted: rgba(26,18,9,0.45);
  --muted2: rgba(26,18,9,0.12);
  --muted3: rgba(26,18,9,0.06);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Noto Sans SC', sans-serif;
  min-height: 100vh;
  line-height: 1.8;
}

/* BG pattern */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 60% 40% at 5% 10%, rgba(192,57,43,0.04) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 95% 90%, rgba(212,160,23,0.05) 0%, transparent 60%);
}

/* ── HEADER ── */
header {
  position: relative; z-index: 10;
  padding: 24px 40px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--muted2);
  background: rgba(250,247,242,0.9);
  backdrop-filter: blur(8px);
}
.logo {
  display: flex; align-items: center; gap: 14px;
}
.logo-seal {
  width: 44px; height: 44px;
  background: var(--red);
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Noto Serif SC', serif;
  font-size: 18px; font-weight: 900; color: white;
  letter-spacing: -1px;
  box-shadow: 2px 2px 0 rgba(192,57,43,0.3);
}
.logo-text {
  font-family: 'Noto Serif SC', serif;
  font-size: 20px; font-weight: 700;
  color: var(--ink); letter-spacing: 2px;
}
.logo-sub {
  font-size: 11px; letter-spacing: 3px;
  color: var(--muted); font-weight: 400;
}

/* Streak display */
.streak-display {
  display: flex; align-items: center; gap: 8px;
  background: linear-gradient(135deg, rgba(192,57,43,0.08), rgba(212,160,23,0.08));
  border: 1px solid rgba(192,57,43,0.15);
  border-radius: 24px; padding: 8px 18px;
  cursor: pointer;
}
.streak-fire { font-size: 20px; }
.streak-num {
  font-family: 'Noto Serif SC', serif;
  font-size: 22px; font-weight: 900; color: var(--red);
  line-height: 1;
}
.streak-label { font-size: 11px; color: var(--muted); letter-spacing: 1px; }

/* ── TABS ── */
.tabs {
  position: relative; z-index: 5;
  display: flex; border-bottom: 1px solid var(--muted2);
  background: var(--bg);
  padding: 0 40px;
  gap: 0;
}
.tab {
  padding: 14px 24px;
  font-size: 13px; font-weight: 500; letter-spacing: 1px;
  color: var(--muted); cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  position: relative; top: 1px;
}
.tab.active {
  color: var(--red);
  border-bottom-color: var(--red);
  font-weight: 700;
}
.tab:hover:not(.active) { color: var(--ink3); }

/* ── MAIN ── */
.main {
  position: relative; z-index: 1;
  max-width: 1080px; margin: 0 auto;
  padding: 32px 24px 80px;
}

/* Tab panels */
.panel { display: none; }
.panel.active { display: block; }

/* ── TODAY PANEL ── */
.today-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 24px;
}

.card {
  background: white;
  border: 1px solid var(--muted2);
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(26,18,9,0.04);
}
.card-header {
  padding: 16px 22px;
  border-bottom: 1px solid var(--muted3);
  display: flex; align-items: center; gap: 10px;
}
.card-icon { font-size: 18px; }
.card-title {
  font-size: 13px; font-weight: 700;
  letter-spacing: 2px; color: var(--ink3);
}
.card-body { padding: 20px 22px; }

/* Passage input area */
.passage-box {
  width: 100%; min-height: 180px;
  padding: 14px 16px;
  background: var(--bg);
  border: 1.5px solid var(--muted2);
  border-radius: 8px;
  font-family: 'Noto Serif SC', serif;
  font-size: 15px; line-height: 2;
  color: var(--ink); outline: none; resize: vertical;
  transition: border-color 0.2s;
}
.passage-box:focus { border-color: rgba(192,57,43,0.35); }
.passage-box::placeholder { color: var(--muted); font-size: 14px; }

.passage-display {
  background: var(--bg2);
  border-left: 4px solid var(--red);
  border-radius: 0 8px 8px 0;
  padding: 16px 18px;
  font-family: 'Noto Serif SC', serif;
  font-size: 15px; line-height: 2.1;
  color: var(--ink2);
  min-height: 120px;
  display: none;
}

/* Source tag */
.source-row {
  display: flex; align-items: center; gap: 8px;
  margin-top: 10px;
}
.source-input {
  flex: 1; padding: 8px 12px;
  background: var(--bg3);
  border: 1px solid var(--muted2); border-radius: 6px;
  font-family: 'Noto Sans SC', sans-serif; font-size: 13px;
  color: var(--ink); outline: none;
}
.genre-select {
  padding: 8px 12px;
  background: white; border: 1px solid var(--muted2);
  border-radius: 6px; font-family: 'Noto Sans SC', sans-serif;
  font-size: 13px; color: var(--ink); outline: none; cursor: pointer;
}

/* Action buttons */
.btn {
  padding: 10px 22px; border: none; border-radius: 8px;
  font-family: 'Noto Sans SC', sans-serif; font-size: 14px;
  font-weight: 700; cursor: pointer; transition: all 0.2s;
  letter-spacing: 1px;
}
.btn-primary {
  background: var(--red); color: white;
}
.btn-primary:hover { background: var(--red2); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(192,57,43,0.25); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.btn-secondary {
  background: var(--bg2); color: var(--ink3);
  border: 1px solid var(--muted2);
}
.btn-secondary:hover { background: var(--muted3); }
.btn-green { background: var(--green); color: white; }
.btn-green:hover { background: var(--green2); transform: translateY(-1px); }

/* Writing area */
.writing-box {
  width: 100%; min-height: 220px;
  padding: 16px 18px;
  background: var(--bg);
  border: 1.5px solid var(--muted2); border-radius: 8px;
  font-family: 'Noto Serif SC', serif;
  font-size: 15px; line-height: 2.1;
  color: var(--ink); outline: none; resize: vertical;
  transition: border-color 0.2s;
}
.writing-box:focus { border-color: rgba(192,57,43,0.35); }
.writing-box::placeholder { color: var(--muted); font-size: 14px; }

/* Char count */
.char-count {
  font-size: 12px; color: var(--muted);
  text-align: right; margin-top: 6px;
}

/* Questions */
.questions-area { display: none; }
.question-item {
  margin-bottom: 16px;
  padding: 14px 16px;
  background: var(--bg2);
  border-radius: 8px;
  border-left: 3px solid var(--gold);
}
.question-text {
  font-size: 14px; font-weight: 600;
  color: var(--ink2); margin-bottom: 8px;
}
.question-answer {
  width: 100%; padding: 8px 12px;
  background: white; border: 1px solid var(--muted2);
  border-radius: 6px; font-family: 'Noto Sans SC', sans-serif;
  font-size: 14px; color: var(--ink); outline: none;
  resize: none; min-height: 60px; line-height: 1.7;
}

/* Guide box */
.guide-box {
  background: linear-gradient(135deg, rgba(192,57,43,0.05), rgba(212,160,23,0.05));
  border: 1px solid rgba(192,57,43,0.12);
  border-radius: 8px; padding: 16px 18px;
  margin-bottom: 16px; display: none;
}
.guide-title {
  font-size: 12px; font-weight: 700; letter-spacing: 2px;
  color: var(--red); margin-bottom: 8px;
}
.guide-content {
  font-size: 14px; color: var(--ink3); line-height: 1.9;
}

/* Feedback */
.feedback-area {
  background: white; border: 1px solid var(--muted2);
  border-radius: 12px; overflow: hidden;
  margin-top: 20px; display: none;
}
.feedback-area.visible { display: block; }
.feedback-header {
  padding: 16px 22px; border-bottom: 1px solid var(--muted3);
  background: linear-gradient(135deg, rgba(192,57,43,0.06), rgba(212,160,23,0.04));
  display: flex; align-items: center; justify-content: space-between;
}
.feedback-title {
  font-size: 14px; font-weight: 700; letter-spacing: 1px; color: var(--ink);
}
.feedback-score {
  font-family: 'Noto Serif SC', serif;
  font-size: 28px; font-weight: 900; color: var(--red);
}
.feedback-body { padding: 20px 22px; }
.feedback-section { margin-bottom: 18px; }
.feedback-section:last-child { margin-bottom: 0; }
.feedback-section-title {
  font-size: 11px; font-weight: 700; letter-spacing: 3px;
  color: var(--red); text-transform: uppercase; margin-bottom: 8px;
}
.feedback-text { font-size: 14px; color: var(--ink3); line-height: 1.9; }
.highlight { background: rgba(212,160,23,0.15); padding: 2px 4px; border-radius: 3px; }
.fb-good {
  background: rgba(45,106,79,0.06); border-left: 3px solid var(--green);
  padding: 10px 14px; border-radius: 0 6px 6px 0; margin: 8px 0;
  font-size: 14px; color: var(--ink3); line-height: 1.9;
}
.fb-improve {
  background: rgba(192,57,43,0.05); border-left: 3px solid var(--red);
  padding: 10px 14px; border-radius: 0 6px 6px 0; margin: 8px 0;
  font-size: 14px; color: var(--ink3); line-height: 1.9;
}

/* Save banner */
.save-banner {
  background: linear-gradient(135deg, var(--green), #1a4731);
  color: white; padding: 14px 22px;
  display: flex; align-items: center; justify-content: space-between;
  display: none;
}
.save-banner.visible { display: flex; }

/* ── STREAK PANEL ── */
.streak-panel { padding: 8px 0; }
.streak-stats {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 16px; margin-bottom: 28px;
}
.stat-card {
  background: white; border: 1px solid var(--muted2);
  border-radius: 12px; padding: 20px 24px; text-align: center;
}
.stat-num {
  font-family: 'Noto Serif SC', serif;
  font-size: 36px; font-weight: 900; color: var(--red);
  line-height: 1; margin-bottom: 6px;
}
.stat-label { font-size: 12px; color: var(--muted); letter-spacing: 1px; }

.calendar-grid {
  display: grid; grid-template-columns: repeat(7, 1fr);
  gap: 6px; margin-bottom: 20px;
}
.cal-day {
  aspect-ratio: 1;
  border-radius: 6px;
  background: var(--muted3);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; color: var(--muted);
  font-weight: 500;
}
.cal-day.done {
  background: var(--red); color: white; font-weight: 700;
}
.cal-day.today {
  border: 2px solid var(--red); color: var(--red); font-weight: 700;
}

/* ── COLLECTION PANEL ── */
.collection-empty {
  text-align: center; padding: 60px 24px;
  color: var(--muted);
}
.collection-empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
.collection-list { display: grid; gap: 16px; }
.collection-item {
  background: white; border: 1px solid var(--muted2);
  border-radius: 10px; padding: 20px 22px;
}
.collection-item-date { font-size: 11px; color: var(--muted); margin-bottom: 8px; letter-spacing: 1px; }
.collection-item-passage {
  font-family: 'Noto Serif SC', serif;
  font-size: 13px; color: var(--ink3); line-height: 1.8;
  border-left: 3px solid var(--gold); padding-left: 12px;
  margin-bottom: 12px;
}
.collection-item-writing {
  font-size: 14px; color: var(--ink2); line-height: 1.9;
  white-space: pre-wrap;
}
.collection-item-score {
  display: inline-block; margin-top: 10px;
  background: rgba(192,57,43,0.08); color: var(--red);
  padding: 3px 12px; border-radius: 12px;
  font-size: 12px; font-weight: 700;
}

/* Loading */
.loading-dots {
  display: inline-flex; gap: 4px; align-items: center;
}
.loading-dots span {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--red); animation: dot 1.2s infinite;
}
.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dot { 0%,80%,100%{opacity:0.2;transform:scale(0.8)} 40%{opacity:1;transform:scale(1)} }

/* Row utilities */
.row { display: flex; gap: 10px; align-items: flex-start; flex-wrap: wrap; }
.mt8 { margin-top: 8px; }
.mt12 { margin-top: 12px; }
.mt16 { margin-top: 16px; }
.mt20 { margin-top: 20px; }

/* API modal */
.modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 999;
  background: rgba(26,18,9,0.7); backdrop-filter: blur(6px);
  align-items: center; justify-content: center; padding: 24px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: white; border-radius: 16px;
  padding: 36px; max-width: 440px; width: 100%;
  box-shadow: 0 20px 60px rgba(26,18,9,0.2);
}
.modal-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 20px; font-weight: 700; margin-bottom: 8px;
}
.modal-desc { font-size: 13px; color: var(--muted); line-height: 1.8; margin-bottom: 20px; }
.modal-input {
  width: 100%; padding: 12px 14px;
  border: 1.5px solid var(--muted2); border-radius: 8px;
  font-family: 'Noto Sans SC', sans-serif; font-size: 14px;
  color: var(--ink); outline: none; margin-bottom: 10px;
  transition: border-color 0.2s;
}
.modal-input:focus { border-color: var(--red); }
.modal-note { font-size: 12px; color: var(--muted); margin-bottom: 20px; line-height: 1.7; }

@media (max-width: 768px) {
  .today-grid { grid-template-columns: 1fr; }
  header { padding: 16px 20px; }
  .tabs { padding: 0 16px; }
  .main { padding: 20px 16px 60px; }
  .streak-stats { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">
    <div class="logo-seal">文心</div>
    <div>
      <div class="logo-text">文心写作</div>
      <div class="logo-sub">每日阅读 · 仿写 · 精进</div>
    </div>
  </div>
  <div class="streak-display" onclick="switchTab('streak')">
    <div class="streak-fire">🔥</div>
    <div>
      <div class="streak-num" id="streakNum">0</div>
      <div class="streak-label">连续天数</div>
    </div>
  </div>
</header>

<!-- Tabs -->
<div class="tabs">
  <div class="tab active" onclick="switchTab('today')">今日练习</div>
  <div class="tab" onclick="switchTab('streak')">打卡记录</div>
  <div class="tab" onclick="switchTab('collection')">优秀收藏</div>
</div>

<!-- Main -->
<div class="main">

  <!-- TODAY PANEL -->
  <div class="panel active" id="panel-today">

    <div class="today-grid">

      <!-- Left: Passage -->
      <div class="card">
        <div class="card-header">
          <div class="card-icon">📖</div>
          <div class="card-title">今日段落</div>
        </div>
        <div class="card-body">
          <div id="passageInputArea">
            <textarea class="passage-box" id="passageInput"
              placeholder="从《儿童文学》或其他书籍中，粘贴一段你觉得写得特别好的段落……&#10;&#10;可以是优美的景物描写、生动的人物刻画、或者打动你的叙述片段。"></textarea>
            <div class="source-row mt8">
              <input class="source-input" type="text" id="sourceInput" placeholder="来源：书名 / 作者（选填）">
              <select class="genre-select" id="genreSelect">
                <option value="景物描写">景物描写</option>
                <option value="人物刻画">人物刻画</option>
                <option value="叙事片段">叙事片段</option>
                <option value="抒情散文">抒情散文</option>
                <option value="其他">其他</option>
              </select>
            </div>
            <div class="row mt12">
              <button class="btn btn-primary" onclick="analysePassage()">开始今日练习 →</button>
            </div>
          </div>

          <div id="passageDisplayArea" style="display:none">
            <div class="passage-display" id="passageDisplay"></div>
            <div class="mt12" style="display:flex;align-items:center;justify-content:space-between">
              <span style="font-size:12px;color:var(--muted)" id="passageSource"></span>
              <button class="btn btn-secondary" style="font-size:12px;padding:6px 14px" onclick="resetPassage()">换一段</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Right: Questions -->
      <div class="card">
        <div class="card-header">
          <div class="card-icon">💡</div>
          <div class="card-title">阅读理解</div>
        </div>
        <div class="card-body">
          <div id="questionsPlaceholder" style="color:var(--muted);font-size:14px;padding:20px 0;text-align:center">
            粘贴段落后，这里会出现<br>3个阅读理解小问题 ✦
          </div>
          <div class="questions-area" id="questionsArea"></div>
        </div>
      </div>

    </div>

    <!-- Writing section -->
    <div class="card" id="writingCard" style="display:none">
      <div class="card-header">
        <div class="card-icon">✍️</div>
        <div class="card-title">仿写练习</div>
        <div style="margin-left:auto;font-size:12px;color:var(--muted)" id="writingHint"></div>
      </div>
      <div class="card-body">
        <div class="guide-box" id="guideBox">
          <div class="guide-title">✦ 仿写引导</div>
          <div class="guide-content" id="guideContent"></div>
        </div>
        <textarea class="writing-box" id="writingBox"
          placeholder="根据上面的段落，写一段仿写……&#10;&#10;可以写你旅行过的地方、你熟悉的场景，或者任何你想描写的人物和故事。尽量学习原段落的写法，但用自己的语言。"></textarea>
        <div class="char-count" id="charCount">0 字</div>
        <div class="row mt12">
          <button class="btn btn-primary" id="submitWritingBtn" onclick="submitWriting()">提交仿写，获取反馈</button>
          <div id="loadingIndicator" style="display:none;align-items:center;gap:8px;color:var(--muted);font-size:14px">
            <div class="loading-dots"><span></span><span></span><span></span></div>
            老师正在阅读你的仿写…
          </div>
        </div>
      </div>
    </div>

    <!-- Feedback -->
    <div class="feedback-area" id="feedbackArea">
      <div class="feedback-header">
        <div class="feedback-title">📝 老师点评</div>
        <div id="feedbackScoreDisplay"></div>
      </div>
      <div class="feedback-body" id="feedbackBody"></div>
      <div class="save-banner" id="saveBanner">
        <span>🌟 这篇仿写写得不错！要收藏到"优秀作品"吗？</span>
        <div style="display:flex;gap:8px">
          <button class="btn" style="background:white;color:var(--green);font-size:13px;padding:7px 16px" onclick="saveToCollection()">收藏 ✦</button>
          <button class="btn" style="background:rgba(255,255,255,0.2);color:white;font-size:13px;padding:7px 16px" onclick="checkIn()">完成打卡 →</button>
        </div>
      </div>
      <div id="checkinBanner" style="display:none;background:var(--green);color:white;padding:14px 22px;display:flex;align-items:center;gap:12px">
        <span style="font-size:22px">🎉</span>
        <span style="font-size:14px;font-weight:700" id="checkinMsg"></span>
      </div>

      <!-- Followup chat -->
      <div style="padding:16px 22px;border-top:1px solid var(--muted3)">
        <div style="font-size:12px;font-weight:700;letter-spacing:2px;color:var(--muted);margin-bottom:8px">继续追问老师</div>
        <div style="display:flex;gap:8px">
          <input type="text" id="followupInput" placeholder="例如：第一句怎么改会更好？"
            style="flex:1;padding:9px 14px;border:1px solid var(--muted2);border-radius:6px;font-family:'Noto Sans SC',sans-serif;font-size:14px;color:var(--ink);outline:none;background:var(--bg)"
            onkeydown="if(event.key==='Enter')sendFollowup()">
          <button class="btn btn-secondary" style="padding:9px 16px;font-size:14px" onclick="sendFollowup()" id="followupBtn">问 →</button>
        </div>
        <div id="chatHistory" style="margin-top:12px"></div>
      </div>
    </div>

  </div>

  <!-- STREAK PANEL -->
  <div class="panel" id="panel-streak">
    <div class="streak-panel">
      <div class="streak-stats">
        <div class="stat-card">
          <div class="stat-num" id="statStreak">0</div>
          <div class="stat-label">🔥 当前连续</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="statTotal">0</div>
          <div class="stat-label">📚 累计练习</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="statChars">0</div>
          <div class="stat-label">✍️ 累计字数</div>
        </div>
      </div>
      <div style="font-size:12px;font-weight:700;letter-spacing:3px;color:var(--muted);margin-bottom:12px">最近 35 天打卡</div>
      <div class="calendar-grid" id="calendarGrid"></div>
    </div>
  </div>

  <!-- COLLECTION PANEL -->
  <div class="panel" id="panel-collection">
    <div id="collectionEmpty" class="collection-empty">
      <div class="collection-empty-icon">🌸</div>
      <div style="font-size:15px;font-weight:700;margin-bottom:8px">还没有收藏的作品</div>
      <div style="font-size:13px">完成仿写并获得好评后，可以收藏到这里</div>
    </div>
    <div class="collection-list" id="collectionList"></div>
  </div>

</div>

<script>
// ── STATE ──
let apiKey = localStorage.getItem('wenxin_api_key') || '';
let currentPassage = '';
let currentSource = '';
let currentGenre = '';
let currentWriting = '';
let currentFeedback = null;
let conversationHistory = [];
let todayCheckedIn = false;

// Storage helpers
const getData = (k, def) => { try { return JSON.parse(localStorage.getItem(k)) || def; } catch { return def; } };
const setData = (k, v) => localStorage.setItem(k, JSON.stringify(v));

function getToday() {
  return new Date().toISOString().split('T')[0];
}

// ── INIT ──
window.addEventListener('load', () => {
  if (!apiKey) {
    
  }
  updateStreak();
  renderCalendar();
  renderCollection();

  // Check if already done today
  const log = getData('wenxin_log', []);
  todayCheckedIn = log.some(e => e.date === getToday());
});


// ── TABS ──
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    const names = ['today', 'streak', 'collection'];
    t.classList.toggle('active', names[i] === name);
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  if (name === 'streak') { renderCalendar(); }
  if (name === 'collection') { renderCollection(); }
}

// ── PASSAGE ANALYSIS ──
async function analysePassage() {
  const passage = document.getElementById('passageInput').value.trim();
  if (passage.length < 20) { alert('请粘贴一段文字（至少20字）'); return; }

  currentPassage = passage;
  currentSource = document.getElementById('sourceInput').value.trim();
  currentGenre = document.getElementById('genreSelect').value;

  // Show passage display
  document.getElementById('passageInputArea').style.display = 'none';
  document.getElementById('passageDisplayArea').style.display = 'block';
  document.getElementById('passageDisplay').style.display = 'block';
  document.getElementById('passageDisplay').textContent = passage;
  document.getElementById('passageSource').textContent = currentSource ? `📚 ${currentSource} · ${currentGenre}` : `✦ ${currentGenre}`;

  // Show writing card
  document.getElementById('writingCard').style.display = 'block';
  document.getElementById('writingHint').textContent = currentGenre;

  // Generate questions + guide
  await generateQuestionsAndGuide(passage, currentGenre);
}

async function generateQuestionsAndGuide(passage, genre) {
  const placeholder = document.getElementById('questionsPlaceholder');
  placeholder.innerHTML = '<div style="color:var(--muted);font-size:14px;display:flex;align-items:center;gap:8px"><div class="loading-dots"><span></span><span></span><span></span></div>正在生成问题…</div>';

  const prompt = `你是一位有经验的中文语文老师，正在指导一位7年级的学生进行阅读和仿写练习。

学生选择的段落类型：${genre}
段落内容：
${passage}

请完成两个任务，以JSON格式返回（不要任何markdown标记）：

{
  "questions": [
    {"q": "第一个理解问题（针对这段文字的写法或内容）"},
    {"q": "第二个问题（引导学生发现精妙之处）"},
    {"q": "第三个问题（连接学生自己的生活经验）"}
  ],
  "guide": "仿写引导：2-3句话，具体告诉学生这段文字的写法特点，以及仿写时可以模仿的具体技巧（如：句式、感官描写、比喻手法等）",
  "technique": "这段文字最值得学习的一个核心写作技巧，用一句话概括"
}

问题要具体、有深度，不要泛泛而谈。引导语要实用，能直接帮助学生动笔。`;

  try {
    const resp = await callAPI(prompt, '你是一位温暖有经验的中文语文老师，善于引导学生发现文字之美。只返回JSON，不要其他内容。');
    const clean = resp.replace(/```json|```/g, '').trim();
    const data = JSON.parse(clean);

    // Render questions
    const qArea = document.getElementById('questionsArea');
    let html = '';
    data.questions.forEach((q, i) => {
      html += `<div class="question-item">
        <div class="question-text">${i+1}. ${q.q}</div>
        <textarea class="question-answer" placeholder="写下你的想法…" rows="2"></textarea>
      </div>`;
    });
    qArea.innerHTML = html;
    qArea.style.display = 'block';
    placeholder.style.display = 'none';

    // Render guide
    if (data.guide) {
      document.getElementById('guideContent').textContent = data.guide;
      document.getElementById('guideBox').style.display = 'block';
    }
    if (data.technique) {
      document.getElementById('writingHint').textContent = `学习重点：${data.technique}`;
    }

  } catch(e) {
    placeholder.innerHTML = `<div style="color:#c0392b;font-size:13px;background:#fdf0ee;padding:12px;border-radius:8px;border-left:3px solid #c0392b">
      ⚠️ 生成失败：${e.message}<br>
      <span style="color:#888;font-size:12px">请检查 API Key 是否正确，或刷新页面重试。</span>
    </div>`;
  }
}

function resetPassage() {
  document.getElementById('passageInputArea').style.display = 'block';
  document.getElementById('passageDisplayArea').style.display = 'none';
  document.getElementById('passageDisplay').style.display = 'none';
  document.getElementById('writingCard').style.display = 'none';
  document.getElementById('questionsArea').style.display = 'none';
  document.getElementById('questionsPlaceholder').style.display = 'block';
  document.getElementById('questionsPlaceholder').innerHTML = '粘贴段落后，这里会出现<br>3个阅读理解小问题 ✦';
  document.getElementById('guideBox').style.display = 'none';
  document.getElementById('feedbackArea').classList.remove('visible');
  document.getElementById('chatHistory').innerHTML = '';
  document.getElementById('writingBox').value = '';
  updateCharCount();
  currentPassage = ''; conversationHistory = [];
}

// Char count
document.addEventListener('DOMContentLoaded', () => {});
document.getElementById && document.getElementById('writingBox') &&
  document.getElementById('writingBox').addEventListener('input', updateCharCount);

function updateCharCount() {
  const len = (document.getElementById('writingBox')?.value || '').length;
  document.getElementById('charCount').textContent = len + ' 字';
}

// ── SUBMIT WRITING ──
async function submitWriting() {
  const writing = document.getElementById('writingBox').value.trim();
  if (writing.length < 30) { alert('请先写一段仿写（至少30字）'); return; }
  currentWriting = writing;

  document.getElementById('submitWritingBtn').style.display = 'none';
  document.getElementById('loadingIndicator').style.display = 'flex';

  const prompt = `你是一位温暖有经验的中文语文老师，正在给一位7年级学生的仿写作业点评。

原始段落（${currentGenre}）：
${currentPassage}

学生的仿写：
${writing}

请以一位有经验的老师的口吻，给出点评。语气温暖鼓励，同时有具体、实用的建议。

以JSON格式返回（不要任何markdown标记）：
{
  "score": "优秀/良好/继续努力（三选一）",
  "score_emoji": "对应的emoji",
  "summary": "整体评价，2-3句，先肯定再建议，语气像老师和学生说话",
  "strengths": ["亮点1，要具体指出文中哪句话或哪个词好，说明好在哪里", "亮点2"],
  "improvements": [
    {"point": "需要改进的地方（具体）", "suggestion": "具体怎么改，最好举例说明"}
  ],
  "best_sentence": "学生仿写中最好的一句话（直接引用）",
  "next_tip": "下次仿写时最重要的一个建议",
  "save_worthy": true或false（是否值得收藏到优秀作品）
}`;

  conversationHistory = [{ role: 'user', content: prompt }];

  try {
    const resp = await callAPI(prompt, '你是温暖有经验的语文老师。只返回JSON，不含markdown。');
    conversationHistory.push({ role: 'assistant', content: resp });

    const clean = resp.replace(/```json|```/g, '').trim();
    const fb = JSON.parse(clean);
    currentFeedback = fb;
    renderFeedback(fb);
  } catch(e) {
    document.getElementById('feedbackArea').classList.add('visible');
    document.getElementById('feedbackBody').innerHTML = `<div style="color:#c0392b;font-size:13px;background:#fdf0ee;padding:12px;border-radius:8px;border-left:3px solid #c0392b">
      ⚠️ 反馈生成失败：${e.message}<br>
      <span style="color:#888;font-size:12px">请检查 API Key 是否正确，或刷新页面重试。</span>
    </div>`;
  }

  document.getElementById('loadingIndicator').style.display = 'none';
  document.getElementById('submitWritingBtn').style.display = 'inline-flex';
}

function renderFeedback(fb) {
  document.getElementById('feedbackArea').classList.add('visible');

  // Score
  document.getElementById('feedbackScoreDisplay').innerHTML =
    `<span style="font-size:18px">${fb.score_emoji||'✦'}</span>
     <span style="font-family:'Noto Serif SC',serif;font-size:16px;font-weight:700;color:var(--red);margin-left:6px">${fb.score||''}</span>`;

  // Body
  let html = '';

  if (fb.summary) {
    html += `<div class="feedback-section">
      <div class="feedback-text">${fb.summary}</div>
    </div>`;
  }

  if (fb.best_sentence) {
    html += `<div class="feedback-section">
      <div class="feedback-section-title">✦ 最佳句子</div>
      <div class="fb-good">「${fb.best_sentence}」</div>
    </div>`;
  }

  if (fb.strengths?.length) {
    html += `<div class="feedback-section">
      <div class="feedback-section-title">☀ 写得好的地方</div>
      ${fb.strengths.map(s=>`<div class="fb-good">• ${s}</div>`).join('')}
    </div>`;
  }

  if (fb.improvements?.length) {
    html += `<div class="feedback-section">
      <div class="feedback-section-title">→ 可以更好</div>
      ${fb.improvements.map(i=>`<div class="fb-improve"><strong>${i.point}</strong><br>${i.suggestion}</div>`).join('')}
    </div>`;
  }

  if (fb.next_tip) {
    html += `<div class="feedback-section">
      <div class="feedback-section-title">💡 下次记住</div>
      <div class="feedback-text" style="background:rgba(212,160,23,0.08);padding:10px 14px;border-radius:6px">${fb.next_tip}</div>
    </div>`;
  }

  document.getElementById('feedbackBody').innerHTML = html;

  // Save banner
  if (fb.save_worthy) {
    document.getElementById('saveBanner').classList.add('visible');
  } else {
    document.getElementById('saveBanner').style.display = 'none';
    // Just show checkin
    checkIn();
  }

  document.getElementById('followupBtn').disabled = false;
  document.getElementById('feedbackArea').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ── CHECK IN ──
function checkIn() {
  if (todayCheckedIn) return;
  const today = getToday();
  const log = getData('wenxin_log', []);
  const charCount = currentWriting.length;
  log.push({ date: today, passage: currentPassage.substring(0,100), source: currentSource, genre: currentGenre, writing: currentWriting, score: currentFeedback?.score || '', chars: charCount });
  setData('wenxin_log', log);
  todayCheckedIn = true;
  updateStreak();

  const streak = getStreak();
  const msg = streak >= 7 ? `🔥 连续 ${streak} 天！你已经是写作达人了！` :
              streak >= 3 ? `🎉 太棒了！已经连续 ${streak} 天打卡！` :
              `✅ 今天打卡完成！继续保持！`;

  document.getElementById('checkinMsg').textContent = msg;
  document.getElementById('checkinBanner').style.display = 'flex';
  document.getElementById('saveBanner').style.display = 'none';
  document.getElementById('streakNum').textContent = streak;
}

function saveToCollection() {
  const today = getToday();
  const collection = getData('wenxin_collection', []);
  collection.unshift({
    date: today, passage: currentPassage, source: currentSource,
    genre: currentGenre, writing: currentWriting,
    score: currentFeedback?.score || '', summary: currentFeedback?.summary || ''
  });
  setData('wenxin_collection', collection);
  checkIn();
}

// ── FOLLOWUP ──
async function sendFollowup() {
  const input = document.getElementById('followupInput');
  const q = input.value.trim();
  if (!q || conversationHistory.length === 0) return;

  const chat = document.getElementById('chatHistory');
  chat.innerHTML += `<div style="background:var(--bg2);border-radius:8px;padding:10px 14px;margin-bottom:8px;font-size:14px;color:var(--ink3)"><strong style="color:var(--ink)">你：</strong>${q}</div>`;
  input.value = '';
  document.getElementById('followupBtn').disabled = true;

  conversationHistory.push({ role: 'user', content: q });

  try {
    const resp = await callAPI(null, '你是温暖有经验的语文老师，用中文回答学生关于仿写的问题，简洁实用，300字以内。', conversationHistory);
    conversationHistory.push({ role: 'assistant', content: resp });
    chat.innerHTML += `<div style="background:rgba(192,57,43,0.05);border-left:3px solid var(--red);border-radius:0 8px 8px 0;padding:10px 14px;margin-bottom:8px;font-size:14px;color:var(--ink3)"><strong style="color:var(--red)">老师：</strong>${resp}</div>`;
    chat.scrollTop = chat.scrollHeight;
  } catch(e) {
    chat.innerHTML += `<div style="color:var(--muted);font-size:13px;padding:8px">回复失败，请重试。</div>`;
  }

  document.getElementById('followupBtn').disabled = false;
}

// ── STREAK ──
function getStreak() {
  const log = getData('wenxin_log', []);
  if (log.length === 0) return 0;
  const dates = [...new Set(log.map(e => e.date))].sort().reverse();
  const today = getToday();
  if (dates[0] !== today && dates[0] !== getPrevDay(today)) return 0;
  let streak = 1;
  for (let i = 1; i < dates.length; i++) {
    if (dates[i] === getPrevDay(dates[i-1])) streak++;
    else break;
  }
  return streak;
}

function getPrevDay(dateStr) {
  const d = new Date(dateStr);
  d.setDate(d.getDate() - 1);
  return d.toISOString().split('T')[0];
}

function updateStreak() {
  const s = getStreak();
  document.getElementById('streakNum').textContent = s;
  document.getElementById('statStreak').textContent = s;
  const log = getData('wenxin_log', []);
  document.getElementById('statTotal').textContent = [...new Set(log.map(e=>e.date))].length;
  const totalChars = log.reduce((a,b)=>a+(b.chars||0),0);
  document.getElementById('statChars').textContent = totalChars > 999 ? Math.round(totalChars/1000)+'k' : totalChars;
}

function renderCalendar() {
  const log = getData('wenxin_log', []);
  const doneDates = new Set(log.map(e => e.date));
  const today = getToday();
  const grid = document.getElementById('calendarGrid');
  let html = '';
  for (let i = 34; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const ds = d.toISOString().split('T')[0];
    const dayNum = d.getDate();
    const cls = ds === today ? 'cal-day today' : doneDates.has(ds) ? 'cal-day done' : 'cal-day';
    const icon = doneDates.has(ds) ? '✓' : dayNum;
    html += `<div class="${cls}" title="${ds}">${icon}</div>`;
  }
  grid.innerHTML = html;
  updateStreak();
}

function renderCollection() {
  const collection = getData('wenxin_collection', []);
  const empty = document.getElementById('collectionEmpty');
  const list = document.getElementById('collectionList');
  if (collection.length === 0) {
    empty.style.display = 'block'; list.innerHTML = ''; return;
  }
  empty.style.display = 'none';
  list.innerHTML = collection.map(item => `
    <div class="collection-item">
      <div class="collection-item-date">${item.date} · ${item.genre} ${item.source ? '· ' + item.source : ''}</div>
      <div class="collection-item-passage">${item.passage.substring(0,120)}${item.passage.length>120?'…':''}</div>
      <div class="collection-item-writing">${item.writing}</div>
      ${item.score ? `<div class="collection-item-score">${item.score}</div>` : ''}
    </div>
  `).join('');
}

// ── API CALL ──
async function callAPI(userMsg, systemMsg, history) {
  const prompt = history ? history[history.length - 1].content : userMsg;
  const resp = await fetch('https://anzhi.app.n8n.cloud/webhook/writing-coach', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ prompt, system: systemMsg || '你是温暖的中文语文老师。' })
  });
  const data = await resp.json();
  if (!data.result) throw new Error(JSON.stringify(data));
  return data.result;
}

// Char count listener
window.addEventListener('load', () => {
  document.getElementById('writingBox').addEventListener('input', updateCharCount);
});
</script>

</body>
</html>
